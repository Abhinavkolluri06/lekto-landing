<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEKTO AI | The Academic Cockpit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #050505; }
        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        
        /* Animated Background Orbs */
        .orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; animation: float 10s infinite alternate; }
        .orb-1 { background: var(--primary); top: -100px; left: -100px; }
        .orb-2 { background: var(--secondary); bottom: -100px; right: -100px; animation-delay: 2s; }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }

        /* Glassmorphic Container */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 800px; }

        .badge { display: inline-block; padding: 6px 16px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); border-radius: 100px; color: #c7d2fe; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
        h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.25rem; color: #94a3b8; line-height: 1.6; margin: 20px 0 30px; }

        /* Conversion-Focused CTA */
        .cta-group { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 14px 28px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-decoration: none; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }
        .btn-secondary { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }

        @media (max-width: 600px) { h1 { font-size: 2.5rem; } .cta-group { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <section class="hero">
        <div class="glass-card">
            <div class="badge">Proprietorship • MSME Registered</div>
            <h1>LEKTO AI</h1>
            <p>The <strong>Academic Cockpit</strong> designed for the modern educator. We harness context-aware intelligence to empower teachers and elevate student success.</p>
            
            <div class="cta-group">
                <a href="https://linkedin.com/company/lekto-ai" class="btn btn-primary">Join the Waitlist</a>
                <a href="#about" class="btn btn-secondary">Explore the Mission</a>
            </div>
        </div>
    </section>
</body>
</html>
